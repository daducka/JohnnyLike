name: SimRunner — Optimize Golden

on:
  workflow_dispatch:

jobs:
  simrunner-optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore JohnnyLike.sln

    - name: Build (Release)
      run: dotnet build JohnnyLike.sln --configuration Release --no-restore /warnaserror

    - name: Run tests
      run: dotnet test JohnnyLike.sln --configuration Release --no-build --verbosity normal

    - name: Run optimizer
      run: |
        dotnet run --project src/JohnnyLike.SimRunner --configuration Release --no-build -- \
          optimize-golden \
          --input-profile default \
          --output artifacts/optimizer

    - name: Upload optimizer artifacts
      uses: actions/upload-artifact@v4
      with:
        name: simrunner-optimizer
        path: artifacts/optimizer/
        retention-days: 30

    - name: Annotate run ID for evaluate workflow
      run: |
        echo "::notice title=▶ Next step — Evaluate Optimized Profile::To evaluate this optimized profile, trigger the 'SimRunner — Evaluate Optimized Profile' workflow and set 'optimized_profile_run_id' to: ${{ github.run_id }}"
        {
          echo "## ✅ Optimizer completed — run ID: \`${{ github.run_id }}\`"
          echo ""
          echo "To evaluate the optimized profile produced by this run:"
          echo ""
          echo "1. Go to **Actions → SimRunner — Evaluate Optimized Profile**"
          echo "2. Click **Run workflow**"
          echo "3. Set the **\"Run ID of the simrunner-optimize workflow\"** input to:"
          echo ""
          echo "   \`\`\`"
          echo "   ${{ github.run_id }}"
          echo "   \`\`\`"
        } >> "$GITHUB_STEP_SUMMARY"
