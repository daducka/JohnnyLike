name: SimRunner — Evaluate Optimized Profile

on:
  workflow_dispatch:
    inputs:
      optimized_profile_run_id:
        description: 'Run ID of the simrunner-optimize workflow to download the optimized profile from (leave blank to use default profile)'
        required: false
        type: string

jobs:
  simrunner-evaluate-optimized:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore JohnnyLike.sln

    - name: Build (Release)
      run: dotnet build JohnnyLike.sln --configuration Release --no-restore /warnaserror

    - name: Run tests
      run: dotnet test JohnnyLike.sln --configuration Release --no-build --verbosity normal

    - name: Download optimized profile artifact
      if: ${{ inputs.optimized_profile_run_id != '' }}
      uses: actions/download-artifact@v4
      with:
        name: simrunner-optimizer
        path: artifacts/optimizer
        run-id: ${{ inputs.optimized_profile_run_id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Resolve profile path
      id: profile
      run: |
        if [ -f "artifacts/optimizer/optimized-profile.json" ]; then
          echo "path=artifacts/optimizer/optimized-profile.json" >> "$GITHUB_OUTPUT"
          echo "using_fallback=false" >> "$GITHUB_OUTPUT"
        else
          echo "path=default" >> "$GITHUB_OUTPUT"
          echo "using_fallback=true" >> "$GITHUB_OUTPUT"
        fi

    - name: Warn when falling back to default profile
      if: ${{ steps.profile.outputs.using_fallback == 'true' }}
      run: |
        echo "::warning::No optimized-profile.json found — evaluating against the default (baseline) profile. Results represent a baseline evaluation, not an optimized-profile evaluation. To evaluate a truly optimized profile, provide a valid optimized_profile_run_id."

    - name: Run optimized evaluation
      run: |
        dotnet run --project src/JohnnyLike.SimRunner --configuration Release --no-build -- \
          evaluate-golden \
          --profile ${{ steps.profile.outputs.path }} \
          --output artifacts/optimized

    - name: Upload optimized evaluation artifacts
      uses: actions/upload-artifact@v4
      with:
        name: simrunner-optimized-eval
        path: artifacts/optimized/
        retention-days: 30
